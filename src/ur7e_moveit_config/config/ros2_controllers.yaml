controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true
    #################################################
    # Joint State
    #################################################

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    #################################################
    # MoveIt Planning 用
    #################################################

    ur7e_manipulator_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    #################################################
    # MoveIt Servo 用
    #################################################

    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController


#################################################
# Joint Trajectory Controller
#################################################

ur7e_manipulator_controller:
  ros__parameters:

    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 100.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    open_loop_control: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0


#################################################
# Servo Velocity Controller
#################################################

forward_velocity_controller:
  ros__parameters:

    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

    interface_name: velocity